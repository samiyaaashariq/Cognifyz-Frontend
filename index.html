<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cognifyz Frontend Internship</title>

    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1 style="color:blue;">
        Welcome to Cognifyz Internship
    </h1>

    <p style="font-size:20px; color:green;">
        This webpage is created for Front-End Development Internship Tasks.
    </p>

    <img
    src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3"
    width="300"
    alt="Technology">

    <br><br>

    <button id="colorBtn">
        Change Background Color
    </button>

    <hr>

    <h2>Posts From API</h2>

    <div id="posts"></div>

    <hr>

    <h2>Contact Form</h2>

    <form id="myForm">

        <input
        type="text"
        id="name"
        placeholder="Enter Name">

        <br><br>

        <input
        type="email"
        id="email"
        placeholder="Enter Email">

        <br><br>

        <button type="submit">
            Submit
        </button>

    </form>

    <p id="message"></p>

    <script src="script.js"></script>

</body>
</html>
